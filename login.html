<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
     <link rel="shortcut icon" href="img/icon/ChumChatLogotyp.ico" type="image/x-icon">
    <title>Chumchat/register</title>
  </head>
  <link rel="stylesheet" href="/style/login.css" />
  <link rel="stylesheet" href="/style/style.css" />

  <body>
    <nav>
      <img src="img/ChumChatLogotyp.png" class="logo" alt="loga för Chumchat" />
      <ul class="menu">
        <li><a href="#">Register/Logga in</a></li>
      </ul>
    </nav>

    <div class="container">
      <div class="register-card">
        <div class="header">
          <h1>Register</h1>
        </div>

        <form class="form-body">
          <div class="input-group">
            <span class="icon">✉️</span>
            <input type="email" placeholder="Email" />
          </div>

          <div class="input-group">
            <span class="icon">🔒</span>
            <input type="password" placeholder="Password" />
          </div>

          <button type="submit" class="login-btn">Register me</button>
        </form>
      </div>
    </div>
     <footer class="footer">
        <ul>
            <li><a href="">About</a></li>
            <li><a href="">Contact</a></li>
        </ul>
    </footer>
  </body>
</html>
